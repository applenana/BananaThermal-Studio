name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许创建 Release / 上传附件
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build
        run: pyinstaller --noconfirm --clean thermal_dual_app.spec

      - name: List dist
        run: |
          Get-ChildItem dist -Recurse | Select-Object FullName,Length
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BananaThermal-Studio-windows-x64
          path: dist/BananaThermal-Studio.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BananaThermal-Studio.exe
          generate_release_notes: true
